<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - Super Travel Recommendations</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: url('https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=1600') center/cover fixed; min-height: 100vh; }
        nav { background: rgba(0, 0, 0, 0.8); padding: 15px 30px; display: flex; align-items: center; gap: 20px; }
        nav a { color: white; text-decoration: none; padding: 8px 15px; }
        nav a:hover { background: rgba(255, 255, 255, 0.1); border-radius: 5px; }
        .container { max-width: 600px; margin: 50px auto; padding: 20px; }
        .contact-section { background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 10px; }
        .contact-section h1 { color: #333; margin-bottom: 20px; font-size: 2.5em; }
        .contact-section p { color: #666; margin-bottom: 30px; }
        form { display: flex; flex-direction: column; gap: 20px; }
        label { color: #333; font-weight: bold; }
        input, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-family: Arial, sans-serif; font-size: 1em; }
        input:focus, textarea:focus { outline: none; border-color: #007bff; }
        textarea { resize: vertical; min-height: 150px; }
        button[type="submit"] { padding: 12px 30px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; font-weight: bold; }
        button[type="submit"]:hover { background: #0056b3; }
    </style>
</head>
<body>
    <nav>
        <a href="travel_recommendation.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <div class="container">
        <section class="contact-section">
            <h1>Contact Us</h1>
            <p>Have questions or need travel advice? We'd love to hear from you!</p>
            <form>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
                
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
                
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
                
                <button type="submit">Submit</button>
            </form>
        </section>
    </div>
</body>
</html>
